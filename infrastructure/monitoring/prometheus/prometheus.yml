global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: "planner"
    static_configs:
      - targets: ["planner:8001"]

  - job_name: "connectors"
    static_configs:
      - targets: ["connectors:8002"]

  - job_name: "control-plane"
    static_configs:
      - targets: ["control-plane:8003"]

  - job_name: "workers"
    static_configs:
      - targets: ["workers:8004"]

  - job_name: "vision"
    static_configs:
      - targets: ["vision:8005"]
