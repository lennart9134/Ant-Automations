apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/part-of: ant-automations
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane
        app.kubernetes.io/part-of: ant-automations
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: control-plane
          image: ant-control-plane:latest
          ports:
            - containerPort: 8003
              name: http
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: ant-secrets
                  key: postgres-dsn
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ant-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ant-secrets
                  key: jwt-secret
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: ant-config
                  key: cors-origins
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: ant-config
                  key: otel-endpoint
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  labels:
    app.kubernetes.io/name: control-plane
spec:
  selector:
    app.kubernetes.io/name: control-plane
  ports:
    - port: 8003
      targetPort: http
      name: http
