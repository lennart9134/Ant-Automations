apiVersion: apps/v1
kind: Deployment
metadata:
  name: planner
  labels:
    app.kubernetes.io/name: planner
    app.kubernetes.io/part-of: ant-automations
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: planner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: planner
        app.kubernetes.io/part-of: ant-automations
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: planner
          image: ant-planner:latest
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: ant-secrets
                  key: postgres-dsn
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ant-secrets
                  key: redis-url
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: ant-config
                  key: nats-url
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: ant-config
                  key: otel-endpoint
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: planner
  labels:
    app.kubernetes.io/name: planner
spec:
  selector:
    app.kubernetes.io/name: planner
  ports:
    - port: 8001
      targetPort: http
      name: http
