version: "3.9"

services:
  # === Application Services ===

  planner:
    build: ./services/planner
    ports:
      - "8001:8001"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - POSTGRES_DSN=postgresql://ant:ant@postgres:5432/ant
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
    depends_on:
      - postgres
      - redis
      - nats
      - otel-collector

  connectors:
    build: ./services/connectors
    ports:
      - "8002:8002"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      - otel-collector

  control-plane:
    build: ./services/control-plane
    ports:
      - "8003:8003"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - POSTGRES_DSN=postgresql://ant:ant@postgres:5432/ant
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
      - otel-collector

  workers:
    build: ./services/workers
    ports:
      - "8004:8004"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats
      - otel-collector

  vision:
    build: ./services/vision
    ports:
      - "8005:8005"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      - otel-collector

  # === Infrastructure ===

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ant
      POSTGRES_PASSWORD: ant
      POSTGRES_DB: ant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--monitor", "8222"]

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  # === Observability ===

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector metrics
    volumes:
      - ./infrastructure/monitoring/otel/collector.yaml:/etc/otelcol-contrib/config.yaml

  prometheus:
    image: prom/prometheus:v2.54.0
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning

volumes:
  pgdata:
  miniodata:
